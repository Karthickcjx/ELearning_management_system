server:
  port: 8081

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/lms?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Mysql@123}

  jpa:
    generate-ddl: true
    show-sql: false
    properties:
      hibernate:
        transaction:
          jta:
            platform: org.hibernate.engine.transaction.jta.platform.internal.NoJtaPlatform

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

app:
  jwtSecret: ${JWT_SECRET:mySecretKey1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ}
  jwtExpirationMs: ${JWT_EXPIRATION:86400000}
  default-admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123}
    email: ${ADMIN_EMAIL:admin@gmail.com}

  gemini:
    api-key: ${GEMINI_API_KEY:AIzaSyARRCK8u15iNB0Z_eTywVDsPHLZfUVlYi0}

  ai:
    model-version: ${AI_MODEL_VERSION:gemini-3-flash-preview}
    websocket:
      allowed-origins: ${AI_WS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
    rate-limit:
      requests-per-minute: ${AI_RATE_LIMIT_PER_MINUTE:30}
    async:
      core-pool-size: ${AI_ASYNC_CORE_POOL_SIZE:16}
      max-pool-size: ${AI_ASYNC_MAX_POOL_SIZE:64}
      queue-capacity: ${AI_ASYNC_QUEUE_CAPACITY:500}

  rooms:
    websocket:
      allowed-origins: ${ROOM_WS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
    matching:
      group-size: ${ROOM_MATCH_GROUP_SIZE:3}
      max-band-distance: ${ROOM_MATCH_MAX_BAND_DISTANCE:1}
    ai-moderator:
      enabled: ${ROOM_AI_MODERATOR_ENABLED:true}

logging:
  level:
    com.lms.dev: ${APP_LOG_LEVEL:DEBUG}
    org.springframework.security: ${SECURITY_LOG_LEVEL:DEBUG}
